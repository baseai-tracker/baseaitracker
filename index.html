<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BaseAI Tracker - Crypto Dashboard on Base</title>
  <meta name="description" content="AI-Powered Hub for Base Network Tokens"/>

  <!-- Tailwind CSS CDN (with custom config via script) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#a855f7',    // Purple accent
            secondary: '#00d4ff',  // Neon cyan accent
          },
          boxShadow: {
            'neumorphic': '5px 5px 10px #0a0a0a, -5px -5px 10px #1a1a1a',
            'glow-hover': '0 0 15px rgba(0, 212, 255, 0.5)',
          },
        }
      }
    }
  </script>

  <!-- RainbowKit + Wagmi + Viem + React + React-DOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@tanstack/react-query@5/dist/umd/index.production.min.js"></script>
  <script src="https://unpkg.com/viem@2"></script>
  <script src="https://unpkg.com/wagmi@2"></script>
  <script src="https://unpkg.com/@rainbow-me/rainbowkit@2"></script>
  <link rel="stylesheet" href="https://unpkg.com/@rainbow-me/rainbowkit@2/styles.css"/>

  <style>
    body { background: #0a0a0a; color: #e5e5e5; font-family: system-ui, sans-serif; }
    .card-neumorphic {
      background: #111;
      box-shadow: var(--tw-shadow-neumorphic, 5px 5px 10px #0a0a0a, -5px -5px 10px #1a1a1a);
      transition: all 0.3s;
    }
    .card-neumorphic:hover { box-shadow: var(--tw-shadow-glow-hover, 0 0 15px rgba(0,212,255,0.5)); }
    .gradient-bg { background: linear-gradient(135deg, #0a0a0a, #1a1a1a); }
  </style>
</head>
<body class="min-h-screen bg-black text-white">

  <div id="root"></div>

  <script type="text/babel">
    const { WagmiProvider, createConfig, http } = window.Wagmi;
    const { RainbowKitProvider, getDefaultConfig } = window.RainbowKit;
    const { QueryClient, QueryClientProvider } = window.ReactQuery;
    const { base } = window.Wagmi.chains;
    const { useAccount, useConnect, useDisconnect } = window.Wagmi;
    const { ConnectButton } = window.RainbowKit;

    // === CONFIG WAGMI + RAINBOWKIT ===
    const config = getDefaultConfig({
      appName: 'BaseAI Tracker',
      projectId: 'YOUR_PROJECT_ID_HERE', // GANTI INI DENGAN WALLET CONNECT PROJECT ID KAMU
      chains: [base],
      transports: { [base.id]: http() },
    });

    const queryClient = new QueryClient();

    // === MOCK DATA ===
    const mockTokens = [
      { rank: 1, name: 'AIXBT', symbol: 'AIXBT', price: 0.12, change24h: 120, volume: '1.2M', hype: true },
      { rank: 2, name: 'MEMEBASE', symbol: 'MEME', price: 0.008, change24h: -15, volume: '800K', hype: false },
      { rank: 3, name: 'VIRTUAL', symbol: 'VIRT', price: 0.45, change24h: 45, volume: '3.5M', hype: true },
    ];

    // === COMPONENTS ===
    function Navbar() {
      return (
        <nav className="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-purple-900/30 px-6 py-4">
          <div className="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" className="text-2xl font-bold text-purple-400">BaseAI Tracker</a>
            <div className="flex items-center gap-6">
              <input type="text" placeholder="Search token/address" className="bg-gray-900 border border-purple-500/30 rounded px-4 py-2 text-sm focus:outline-none focus:border-cyan-400"/>
              <ConnectButton />
            </div>
          </div>
        </nav>
      );
    }

    function Hero() {
      return (
        <section className="gradient-bg py-20 text-center px-6">
          <h1 className="text-5xl md:text-6xl font-extrabold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
            Your AI-Powered Hub for Base Network
          </h1>
          <p className="text-xl text-gray-400 mt-4 max-w-2xl mx-auto">
            Track trending tokens, AI agents, yields & risks in real-time on Base
          </p>
          <div className="mt-8 flex justify-center gap-4">
            <button className="bg-purple-600 hover:bg-purple-500 px-8 py-4 rounded-lg font-bold">Connect Wallet</button>
            <button className="border border-cyan-500 hover:bg-cyan-900/30 px-8 py-4 rounded-lg">Chat with AI</button>
          </div>
        </section>
      );
    }

    function TokenCard({ token }) {
      const isPositive = token.change24h > 0;
      return (
        <div className="card-neumorphic rounded-xl p-5 text-center">
          <div className="flex justify-center mb-3">
            <div className="w-12 h-12 bg-gradient-to-br from-purple-600 to-cyan-500 rounded-full flex items-center justify-center text-xl font-bold">
              {token.symbol[0]}
            </div>
          </div>
          <h3 className="font-bold text-lg">{token.name} ({token.symbol})</h3>
          <p className="text-2xl font-semibold my-2">${token.price.toFixed(4)}</p>
          <p className={`text-sm ${isPositive ? 'text-green-400' : 'text-red-400'}`}>
            24h: {isPositive ? '+' : ''}{token.change24h}%
          </p>
          <p className="text-xs text-gray-500 mt-2">Vol: ${token.volume}</p>
          {token.hype && <span className="inline-block mt-3 bg-cyan-900/50 text-cyan-300 text-xs px-3 py-1 rounded-full">AI Hype 🔥</span>}
        </div>
      );
    }

    function Trending() {
      return (
        <section className="py-12 px-6 max-w-7xl mx-auto">
          <h2 className="text-3xl font-bold mb-8 text-center">Trending Tokens on Base</h2>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            {mockTokens.map((t, i) => <TokenCard key={i} token={t} />)}
          </div>
        </section>
      );
    }

    function AIChatBubble() {
      const [open, setOpen] = React.useState(false);
      return (
        <>
          <button
            onClick={() => setOpen(!open)}
            className="fixed bottom-6 right-6 bg-gradient-to-r from-cyan-500 to-purple-600 w-14 h-14 rounded-full flex items-center justify-center text-2xl shadow-lg hover:scale-110 transition"
          >
            💬
          </button>
          {open && (
            <div className="fixed bottom-24 right-6 bg-gray-900 border border-purple-500/50 rounded-xl w-80 p-4 shadow-2xl">
              <div className="h-64 overflow-y-auto mb-3 text-sm">
                <p className="text-cyan-300">AI: Hi! Ask me about any Base token...</p>
              </div>
              <input type="text" placeholder="Ask anything..." className="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm"/>
            </div>
          )}
        </>
      );
    }

    // === MAIN APP ===
    function App() {
      const { address } = useAccount();

      return (
        <WagmiProvider config={config}>
          <QueryClientProvider client={queryClient}>
            <RainbowKitProvider>
              <Navbar />
              <Hero />
              <Trending />
              <AIChatBubble />

              {address && (
                <div className="fixed bottom-6 left-6 bg-gray-900/80 px-4 py-2 rounded-lg text-sm border border-cyan-500/30">
                  Connected: {address.slice(0,6)}...{address.slice(-4)}
                </div>
              )}
            </RainbowKitProvider>
          </QueryClientProvider>
        </WagmiProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- Script Babel untuk JSX di browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
  </html>
